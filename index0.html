<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
:root {
  --bg:         #0b0f0c;
  --surface:    #111710;
  --surface2:   #192016;
  --border:     #233020;
  --bdlight:    #2e402a;
  --green:      #00863C;
  --green-dim:  rgba(0,134,60,0.15);
  --green-glow: rgba(0,134,60,0.35);
  --yellow:     #FDB913;
  --yellow-dim: rgba(253,185,19,0.12);
  --text:       #e8f0e9;
  --muted:      #6b856e;
  --danger:     #f05252;
  --radius:     14px;
  --rsm:        8px;
  --font:       'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
  --mono:       'JetBrains Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);
  display:flex;flex-direction:column;align-items:center;min-height:100%}

/* ── HEADER ── */
header{
  width:100%;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  min-height:56px;position:relative;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--green) 0%,var(--yellow) 55%,transparent 100%);
}
.appname{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.appname em{color:var(--yellow);font-style:normal}
.appsub{font-size:10px;color:var(--muted);margin-top:2px}
.badge-cnt{
  font-family:var(--mono);font-size:12px;font-weight:600;
  background:var(--yellow-dim);color:var(--yellow);
  border:1px solid rgba(253,185,19,0.28);
  padding:4px 14px;border-radius:20px;
}
.badge-cnt b{font-size:15px}

/* ── MAIN ── */
main{
  width:100%;max-width:600px;
  flex:1;display:flex;flex-direction:column;
  padding:14px 14px 32px;gap:12px;
}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-head{
  padding:11px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);
}
.card-head-l{display:flex;align-items:center;gap:8px}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--muted);text-transform:uppercase}

/* ── STATUS ── */
.dot{width:7px;height:7px;border-radius:50%;background:var(--bdlight);transition:background .3s;flex-shrink:0}
.dot.active{background:var(--green);box-shadow:0 0 7px var(--green-glow);animation:pulse 1.5s infinite}
.dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stat-txt{font-size:12px;color:var(--muted);font-weight:500}
.stat-txt.active{color:var(--green)}

/* ── VIEWPORT ── */
#vwrap{position:relative;width:100%;background:#000;display:none;overflow:hidden}
#vwrap.on{display:block}
#interactive{width:100%;position:relative}
#interactive video{width:100%;display:block;max-height:240px;object-fit:cover;object-position:center}
#interactive canvas.drawingBuffer{position:absolute;top:0;left:0;width:100%!important;height:100%!important;opacity:.4}

/* 스캔 가이드 */
.ovl{position:absolute;inset:0;pointer-events:none}
.mt,.mb,.ml,.mr{position:absolute;background:rgba(0,0,0,.52)}
.mt{top:0;left:0;right:0;height:28%}
.mb{bottom:0;left:0;right:0;height:28%}
.ml{top:28%;bottom:28%;left:0;width:3%}
.mr{top:28%;bottom:28%;right:0;width:3%}
.sbox{position:absolute;top:28%;bottom:28%;left:3%;right:3%;border:1.5px solid var(--green)}
.c{position:absolute;width:20px;height:20px;border-color:var(--green);border-style:solid}
.c.tl{top:-1px;left:-1px;border-width:3px 0 0 3px}
.c.tr{top:-1px;right:-1px;border-width:3px 3px 0 0}
.c.bl{bottom:-1px;left:-1px;border-width:0 0 3px 3px}
.c.br{bottom:-1px;right:-1px;border-width:0 3px 3px 0}
.sline{position:absolute;left:3%;right:3%;height:2px;
  background:linear-gradient(90deg,transparent,var(--yellow),transparent);
  opacity:.85;animation:scanh 2s ease-in-out infinite}
@keyframes scanh{0%,100%{top:30%}50%{top:70%}}

/* ── CONTROLS ── */
.controls{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
button{
  font-family:var(--font);font-size:13px;font-weight:600;
  padding:9px 16px;border-radius:var(--rsm);border:1px solid var(--border);
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;
}
.btn-go{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px rgba(0,134,60,.3)}
.btn-go:hover{background:#009944}
.btn-go:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--bdlight)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}

.hint{padding:9px 16px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px}
.hd{width:5px;height:5px;border-radius:50%;background:var(--yellow);flex-shrink:0;opacity:.7}

/* ── SCAN LIST ── */
.list-wrap{max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.blist{list-style:none}
.blist:empty::after{
  content:'스캔된 항목이 없습니다';
  display:block;text-align:center;padding:28px;color:var(--muted);font-size:12px;
}
.bi{
  padding:9px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
  animation:si .2s ease;
}
.bi:last-child{border-bottom:none}
.bi:hover{background:var(--surface2)}
@keyframes si{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.bi-num{font-family:var(--mono);font-size:10px;color:var(--muted);width:22px;text-align:right;flex-shrink:0}
.bi-bar{display:flex;align-items:center;gap:2px;flex-shrink:0}
.bi-bar span{width:2px;background:var(--green);opacity:.55;border-radius:1px}
.bi-code{font-family:var(--mono);font-size:14px;letter-spacing:1.5px;color:var(--text);flex:1;font-weight:600}
.bi-time{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
.bi-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px 5px;border-radius:4px;font-size:12px;transition:color .15s;flex-shrink:0}
.bi-del:hover{color:var(--danger);background:rgba(240,82,82,.08)}

/* ── LIST FOOTER ── */
.list-footer{
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  gap:8px;border-top:1px solid var(--border);background:var(--surface2);flex-wrap:wrap;
}
.footer-btns{display:flex;gap:7px}
.btn-sm{font-size:12px;padding:7px 13px}
.btn-danger{background:transparent;color:var(--danger);border-color:rgba(240,82,82,.22)}
.btn-danger:hover{background:rgba(240,82,82,.08)}
.btn-danger:disabled{opacity:.3;cursor:not-allowed}
.btn-dl{background:var(--yellow);color:#1a1200;border-color:var(--yellow);box-shadow:0 2px 6px rgba(253,185,19,.2)}
.btn-dl:hover{background:#ffc520}
.btn-dl:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}

/* ── LIMIT WARNING ── */
.limit-warn{
  padding:9px 16px;
  background:rgba(253,185,19,.07);border-top:1px solid rgba(253,185,19,.18);
  color:var(--yellow);font-size:12px;font-weight:500;text-align:center;
  display:none;
}
.limit-warn.on{display:block}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%) translateY(70px);
  padding:10px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;pointer-events:none;z-index:9999;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok  {background:rgba(0,134,60,.15);border-color:var(--green-glow);color:#4ddb85}
.toast.warn{background:rgba(253,185,19,.1);border-color:rgba(253,185,19,.28);color:var(--yellow)}

@media(max-width:480px){
  .appname{font-size:17px}
  .bi-code{font-size:12px;letter-spacing:1px}
  .bi-time{display:none}
}
</style>
</head>

    <div style="display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;border-top:1px solid var(--border);background:var(--surface2);">

    </div>
  </div>

</main>

<footer style="width:100%;max-width:600px;padding:16px 20px;text-align:center;font-size:11px;color:var(--muted);border-top:1px solid var(--border);margin-top:auto;letter-spacing:0.3px;">

var MAX      = 30;
var DEBOUNCE = 3000;
var scanned  = [];
var running  = false;
var cameras  = [];
var camIdx   = 0;
var lastTime = 0;

/* ── 토스트 ── */
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.className = 'toast'; }, 2400);
}

/* ── 상태 ── */
function setStatus(active, txt, err) {
  var d = document.getElementById('dot');
  var s = document.getElementById('stxt');
  d.className = 'dot' + (active?' active':'') + (err?' error':'');
  s.className = 'stat-txt' + (active?' active':'');
  s.textContent = txt;
}

/* ── 카운터/버튼 ── */
function updateUI() {
  var n = scanned.length;
  document.getElementById('cnt').textContent = n;
  var has = n > 0;
  document.getElementById('btn-clear').disabled = !has;
  document.getElementById('btn-dl').disabled    = !has;
  document.getElementById('limit-warn').className = 'limit-warn' + (n >= MAX ? ' on' : '');
}

/* ── 목록 렌더링 ── */
function render() {
  var ul = document.getElementById('blist');
  ul.innerHTML = '';
  var H = [14,18,10,16,12,18,14,10,16,18];
  scanned.forEach(function(item, i) {
    var li = document.createElement('li');
    li.className = 'bi';
    var bars = H.map(function(h){ return '<span style="height:'+h+'px"></span>'; }).join('');
    li.innerHTML =
      '<span class="bi-num">'+String(i+1).padStart(2,'0')+'</span>'+
      '<div class="bi-bar">'+bars+'</div>'+
      '<span class="bi-code">'+item.digits+'</span>'+
      '<span class="bi-time">'+item.time+'</span>'+
      '<button class="bi-del" onclick="delItem('+i+')" title="삭제">✕</button>';
    ul.appendChild(li);
  });
  // 최신 항목으로 스크롤
  var wrap = document.querySelector('.list-wrap');
  if (wrap) wrap.scrollTop = wrap.scrollHeight;
  updateUI();
}

function delItem(i) { scanned.splice(i, 1); render(); }

function clearAll() {
  if (!scanned.length) return;
  if (!confirm('스캔 목록을 초기화할까요?')) return;
  scanned = []; lastTime = 0; render();
  toast('초기화 완료');
}

/* ── 엑셀 다운로드 ── */
function doDownload() {
  if (!scanned.length) return;
  var bin = atob(TMPL);
  var buf = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  var wb = XLSX.read(buf, { type:'array', cellStyles:true });
  var ws = wb.Sheets['등록양식'];
  for (var i = 0; i < 30; i++) {
    var cell = 'A' + (i + 2);
    ws[cell] = i < scanned.length
      ? { v: scanned[i].digits, t:'s', z:'@' }
      : { v: '', t:'s', z:'@' };
  }
  ws['!ref'] = 'A1:B31';
  var now = new Date();
  var ts = now.getFullYear()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0')
    + '_' + String(now.getHours()).padStart(2,'0')
    + String(now.getMinutes()).padStart(2,'0');
  XLSX.writeFile(wb, '부동산_일괄열람발급_' + ts + '.xlsx');
  toast(scanned.length + '개 저장 완료', 'ok');
}

/* ── 바코드 인식 ── */
function onDetected(result) {
  var raw = (result.codeResult.code || '').trim();
  if (!raw) return;
  var digits = raw.replace(/\D/g, '');
  if (digits.length !== 14) return;
  var now = Date.now();
  if ((now - lastTime) < DEBOUNCE) return;
  if (scanned.some(function(s){ return s.digits === digits; })) {
    lastTime = now;
    toast('이미 스캔됨: ' + digits, 'warn');
    return;
  }
  if (scanned.length >= MAX) {
    toast('최대 30개 도달', 'warn');
    return;
  }
  lastTime = now;
  if (navigator.vibrate) navigator.vibrate(80);
  var t = new Date();
  var ts = String(t.getHours()).padStart(2,'0') + ':'
         + String(t.getMinutes()).padStart(2,'0') + ':'
         + String(t.getSeconds()).padStart(2,'00');
  scanned.push({ digits: digits, time: ts });
  render();
  toast('✓  ' + digits, 'ok');
  if (scanned.length >= MAX) setTimeout(stopScanner, 600);
}

/* ── Quagga 설정 ── */
function getConfig(deviceId) {
  var c = { width:{min:1280,ideal:1920}, height:{min:480,ideal:720}, aspectRatio:{min:2,ideal:3.5} };
  if (deviceId) c.deviceId = { exact: deviceId };
  else          c.facingMode = 'environment';
  return {
    inputStream: {
      name:'Live', type:'LiveStream',
      target: document.getElementById('interactive'),
      constraints: c,
      area: { top:'25%', right:'3%', bottom:'25%', left:'3%' }
    },
    locator:  { patchSize:'large', halfSample:false },
    numOfWorkers: Math.min(navigator.hardwareConcurrency || 2, 4),
    frequency: 15,
    decoder: {
      readers: ['code_39_reader','code_128_reader','codabar_reader',
                'ean_reader','ean_8_reader','upc_reader','upc_e_reader','i2of5_reader'],
      multiple: false
    },
    locate: true
  };
}

function startScanner() {
  if (running) return;
  navigator.mediaDevices.getUserMedia({ video:true })
    .then(function(s) {
      s.getTracks().forEach(function(t){ t.stop(); });
      return navigator.mediaDevices.enumerateDevices();
    })
    .then(function(devs) {
      cameras = devs.filter(function(d){ return d.kind === 'videoinput'; });
      var back = cameras.find(function(c){ return /back|rear|environment|후면/i.test(c.label); });
      camIdx = back ? cameras.indexOf(back) : (cameras.length > 1 ? cameras.length - 1 : 0);
      initQ();
    })
    .catch(function() {
      setStatus(false, '카메라 권한 오류', true);
      toast('카메라 접근이 거부되었습니다', 'warn');
    });
}

function initQ() {
  var id = cameras[camIdx] ? cameras[camIdx].deviceId : null;
  Quagga.init(getConfig(id), function(err) {
    if (err) { setStatus(false,'초기화 실패',true); toast('스캐너 초기화 실패','warn'); return; }
    Quagga.start();
    running = true;
    document.getElementById('vwrap').classList.add('on');
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display  = 'flex';
    document.getElementById('btn-cam').style.display   = cameras.length > 1 ? 'flex' : 'none';
    setStatus(true, '스캐닝 중...');
    Quagga.onDetected(onDetected);
  });
}

function stopScanner() {
  if (!running) return;
  Quagga.offDetected(onDetected);
  Quagga.stop();
  running = false;
  document.getElementById('vwrap').classList.remove('on');
  document.getElementById('btn-start').style.display = 'flex';
  document.getElementById('btn-stop').style.display  = 'none';
  document.getElementById('btn-cam').style.display   = 'none';
  setStatus(false, '카메라 꺼짐');
}

function switchCamera() {
  if (!running || cameras.length < 2) return;
  Quagga.offDetected(onDetected);
  Quagga.stop();
  running = false;
  camIdx = (camIdx + 1) % cameras.length;
  setTimeout(initQ, 300);
}

render();
</script>
</body>
</html>
